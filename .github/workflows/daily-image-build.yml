name: Daily AppCoreOS Image Build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_OUTPUT}"
          echo "date_tag=$(date -u +%Y%m%d)" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64
          pull: true
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/appcoreos:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/appcoreos:${{ steps.vars.outputs.date_tag }}

      - name: Verify published image contains appcorectl
        run: |
          docker pull ghcr.io/${{ steps.vars.outputs.owner_lc }}/appcoreos:${{ steps.vars.outputs.date_tag }}
          docker run --rm --entrypoint /usr/local/bin/appcorectl \
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/appcoreos:${{ steps.vars.outputs.date_tag }} \
            --help >/dev/null
