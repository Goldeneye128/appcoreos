name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  appcorectl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: appcorectl
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust checks
        run: |
          cargo test --locked
          cargo fmt --check
          cargo clippy --locked --all-targets -- -D warnings

  appcorectl-packages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: appcorectl
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: appcorectl -> target

      - name: Build release packages
        run: bash ./scripts/package.sh

      - name: Verify package outputs
        run: |
          ls -1 dist
          test -f dist/SHA256SUMS
          ls dist/*.tar.gz
          ls dist/*.deb
          ls dist/*.rpm

  system-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate shell scripts
        run: |
          bash -n build.sh
          bash -n runvm.sh
          bash -n dev.sh
          find system_files/usr/lib/appcoreos -maxdepth 1 -type f -print0 | xargs -0 file | grep 'shell script' | cut -d: -f1 | xargs -n 1 bash -n

      - name: Validate Python entrypoints
        run: |
          python3 -m py_compile system_files/usr/lib/appcoreos/agent-debug-server.py
          python3 -m py_compile system_files/usr/lib/appcoreos/tui.sh

      - name: Run appliance regression tests
        run: python3 -m unittest tests.test_appliance_hardening -v

  image-definition:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build appliance image
        run: docker build -f Containerfile -t appcoreos-ci .

      - name: Verify appcorectl is present in image
        run: docker run --rm --entrypoint /usr/local/bin/appcorectl appcoreos-ci --help >/dev/null
